name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rustfmt-clippy:
    name: Rustfmt & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: |
          cargo fmt --all
          if ! git diff --quiet; then
            echo "Formatting issues found. Run 'cargo fmt --all' locally."
            git diff
            exit 1
          fi
      - name: Install taplo
        run: cargo install taplo-cli --locked
      - name: Check TOML formatting
        run: taplo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libopus-dev libasound2-dev libsamplerate0-dev pkg-config libssl-dev cmake build-essential ffmpeg
      - name: Install deps (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install cmake pkg-config opus libsndfile libsamplerate ffmpeg
      - name: Install deps (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install cmake pkgconfiglite ffmpeg
      - run: cargo build --verbose
      - run: cargo test --verbose
